<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FutureGram</title>

<style>

/* ================= GLOBAL ================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{

background:
linear-gradient(
135deg,
#020617,
#0f172a,
#111827
);

color:white;

min-height:100vh;

overflow-x:hidden;

}

/* ================= HEADER ================= */

header{

position:sticky;

top:0;

z-index:100;

display:flex;

justify-content:space-between;

align-items:center;

padding:18px 25px;

background:
rgba(15,23,42,0.75);

backdrop-filter:blur(20px);

border-bottom:
1px solid rgba(255,255,255,0.08);

}

.logo{

font-size:32px;

font-weight:900;

background:
linear-gradient(
45deg,
#ff0080,
#7c3aed,
#00d4ff
);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

}

.logout-btn{

padding:12px 18px;

border:none;

border-radius:18px;

background:
rgba(255,255,255,0.08);

color:white;

cursor:pointer;

}

/* ================= CONTAINER ================= */

.container{

max-width:650px;

margin:auto;

padding:20px;

}

/* ================= AUTH ================= */

.auth-card{

padding:30px;

border-radius:30px;

background:
rgba(255,255,255,0.05);

backdrop-filter:blur(20px);

border:
1px solid rgba(255,255,255,0.08);

}

.auth-title{

font-size:32px;

margin-bottom:25px;

font-weight:900;

}

.auth-input{

width:100%;

padding:16px;

margin-bottom:15px;

border:none;

border-radius:18px;

background:
rgba(255,255,255,0.06);

color:white;

outline:none;

font-size:15px;

}

.auth-btn{

width:100%;

padding:15px;

margin-top:10px;

border:none;

border-radius:18px;

font-size:16px;

font-weight:bold;

cursor:pointer;

color:white;

background:
linear-gradient(
45deg,
#ff0080,
#7c3aed,
#00d4ff
);

}

/* ================= FLOAT BUTTON ================= */

.floating-btn{

position:fixed;

bottom:25px;

right:25px;

width:75px;

height:75px;

border:none;

border-radius:28px;

font-size:42px;

font-weight:bold;

cursor:pointer;

z-index:1000;

color:white;

background:
linear-gradient(
45deg,
#ff0080,
#7c3aed,
#00d4ff
);

box-shadow:
0 15px 40px rgba(124,58,237,0.5);

}

/* ================= MODAL ================= */

.modal{

position:fixed;

inset:0;

background:
rgba(0,0,0,0.7);

display:flex;

justify-content:center;

align-items:center;

padding:20px;

backdrop-filter:blur(10px);

z-index:2000;

}

.modal-box{

width:100%;

max-width:550px;

padding:25px;

border-radius:35px;

background:
rgba(15,23,42,0.9);

border:
1px solid rgba(255,255,255,0.08);

}

.modal-top{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:20px;

}

.close-btn{

background:none;

border:none;

color:white;

font-size:24px;

cursor:pointer;

}

/* ================= PREVIEW ================= */

.preview{

position:relative;

overflow:hidden;

border-radius:24px;

margin-bottom:18px;

}

.preview img,
.preview video{

width:100%;

max-height:500px;

object-fit:cover;

border-radius:24px;

display:block;

}

.overlay-text{

position:absolute;

bottom:20px;

left:20px;

font-size:34px;

font-weight:900;

text-shadow:0 0 20px black;

max-width:80%;

word-break:break-word;

}

/* ================= FORM ================= */

.tool-row{

display:flex;

gap:12px;

margin-bottom:15px;

}

.upload-icon{

width:65px;

height:65px;

border-radius:22px;

display:flex;

align-items:center;

justify-content:center;

font-size:30px;

cursor:pointer;

background:
linear-gradient(
45deg,
#ff0080,
#7c3aed
);

}

.modern-input{

width:100%;

padding:15px;

border:none;

border-radius:20px;

background:
rgba(255,255,255,0.06);

color:white;

outline:none;

}

.caption{

width:100%;

min-height:120px;

padding:18px;

border:none;

border-radius:24px;

background:
rgba(255,255,255,0.06);

color:white;

outline:none;

resize:none;

margin-top:15px;

margin-bottom:18px;

}

.share-btn{

width:100%;

padding:16px;

border:none;

border-radius:22px;

font-size:17px;

font-weight:bold;

cursor:pointer;

color:white;

background:
linear-gradient(
45deg,
#ff0080,
#7c3aed,
#00d4ff
);

}

/* ================= POSTS ================= */

.post{

padding:15px;

border-radius:28px;

margin-bottom:25px;

background:
rgba(255,255,255,0.05);

backdrop-filter:blur(20px);

border:
1px solid rgba(255,255,255,0.08);

overflow:hidden;

}

.post-top{

margin-bottom:12px;

font-weight:bold;

}

.media-wrap{

position:relative;

}

.feed-media{

width:100%;

max-height:600px;

object-fit:cover;

border-radius:24px;

}

.feed-text{

position:absolute;

bottom:20px;

left:20px;

font-size:34px;

font-weight:900;

text-shadow:0 0 20px black;

max-width:80%;

}

.feed-caption{

margin-top:14px;

line-height:1.5;

}

/* ================= ACTIONS ================= */

.action-row{

display:flex;

gap:12px;

margin-top:15px;

}

.like-btn,
.comment-count{

padding:12px 18px;

border:none;

border-radius:18px;

background:
rgba(255,255,255,0.08);

color:white;

}

/* ================= COMMENTS ================= */

.comment-box{

display:flex;

gap:10px;

margin-top:18px;

}

.comment-input{

flex:1;

padding:14px;

border:none;

border-radius:18px;

background:
rgba(255,255,255,0.06);

color:white;

outline:none;

}

.comment-btn{

padding:14px 18px;

border:none;

border-radius:18px;

cursor:pointer;

color:white;

background:
linear-gradient(
45deg,
#ff0080,
#7c3aed
);

}

.comment-list{

margin-top:18px;

display:flex;

flex-direction:column;

gap:12px;

}

.single-comment{

padding:14px;

border-radius:18px;

background:
rgba(255,255,255,0.05);

}

.comment-user{

font-size:13px;

font-weight:bold;

margin-bottom:5px;

color:#00d4ff;

}

.hidden{
display:none;
}

</style>

</head>

<body>

<header>

<div class="logo">
FutureGram
</div>

<button
class="logout-btn hidden"
id="logoutBtn"
onclick="logout()">

Logout

</button>

</header>

<div class="container">

<!-- AUTH -->

<div
class="auth-card"
id="authBox">

<h2 class="auth-title">
Welcome Back ✨
</h2>

<input
type="email"
id="email"
class="auth-input"
placeholder="Email">

<input
type="password"
id="password"
class="auth-input"
placeholder="Password">

<button
class="auth-btn"
onclick="signup()">

Signup

</button>

<button
class="auth-btn"
onclick="login()">

Login

</button>

<button
class="auth-btn"
onclick="googleLogin()">

Google Login

</button>

<p id="authMsg"></p>

</div>

<!-- APP -->

<div
id="app"
class="hidden">

<div id="posts"></div>

</div>

</div>

<!-- FLOATING BUTTON -->

<button
class="floating-btn hidden"
id="floatingBtn"
onclick="openModal()">

+

</button>

<!-- MODAL -->

<div
class="modal hidden"
id="modal">

<div class="modal-box">

<div class="modal-top">

<h2>Create Post</h2>

<button
class="close-btn"
onclick="closeModal()">

✕

</button>

</div>

<!-- PREVIEW -->

<div
class="preview hidden"
id="previewContainer">

<img
id="previewImage"
class="hidden">

<video
id="previewVideo"
class="hidden"
controls>
</video>

<div
class="overlay-text"
id="liveOverlayText">
</div>

</div>

<!-- FORM -->

<div class="tool-row">

<label class="upload-icon">

<input
type="file"
id="file"
hidden
accept="image/*,video/*"
onchange="previewMedia(event)">

📸

</label>

<input
type="text"
id="overlayText"
class="modern-input"
placeholder="✨ Add text"
oninput="updateOverlayText()">

</div>

<textarea
id="caption"
class="caption"
placeholder="What's happening?">
</textarea>

<button
class="share-btn"
onclick="uploadPost()">

Share Post 🚀

</button>

<p id="uploadMsg"></p>

</div>

</div>

<script type="module">

// ================= IMPORTS =================

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
GoogleAuthProvider,
signInWithPopup,
onAuthStateChanged,
signOut
}
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
query,
orderBy,
onSnapshot,
serverTimestamp,
doc,
updateDoc,
increment,
arrayUnion
}
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ================= CONFIG =================

const firebaseConfig = {

apiKey: "YOUR_API_KEY",

authDomain: "YOUR_PROJECT.firebaseapp.com",

projectId: "YOUR_PROJECT_ID",

storageBucket: "YOUR_PROJECT.appspot.com",

messagingSenderId: "YOUR_SENDER_ID",

appId: "YOUR_APP_ID"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

// ================= AUTH =================

window.signup = async function(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

await createUserWithEmailAndPassword(
auth,
email,
password
);

};

window.login = async function(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

await signInWithEmailAndPassword(
auth,
email,
password
);

};

window.googleLogin = async function(){

const provider =
new GoogleAuthProvider();

await signInWithPopup(auth,provider);

};

window.logout = async function(){

await signOut(auth);

};

// ================= AUTH STATE =================

onAuthStateChanged(auth,(user)=>{

if(user){

document.getElementById("authBox")
.classList.add("hidden");

document.getElementById("app")
.classList.remove("hidden");

document.getElementById("logoutBtn")
.classList.remove("hidden");

document.getElementById("floatingBtn")
.classList.remove("hidden");

loadPosts();

}else{

document.getElementById("authBox")
.classList.remove("hidden");

document.getElementById("app")
.classList.add("hidden");

document.getElementById("logoutBtn")
.classList.add("hidden");

document.getElementById("floatingBtn")
.classList.add("hidden");

}

});

// ================= MODAL =================

window.openModal = function(){

document.getElementById("modal")
.classList.remove("hidden");

};

window.closeModal = function(){

document.getElementById("modal")
.classList.add("hidden");

};

// ================= PREVIEW =================

window.previewMedia = function(event){

const file = event.target.files[0];

if(!file) return;

const image =
document.getElementById("previewImage");

const video =
document.getElementById("previewVideo");

const container =
document.getElementById("previewContainer");

container.classList.remove("hidden");

const url =
URL.createObjectURL(file);

if(file.type.startsWith("image")){

image.src = url;

image.classList.remove("hidden");

video.classList.add("hidden");

}else{

video.src = url;

video.classList.remove("hidden");

image.classList.add("hidden");

}

};

// ================= OVERLAY =================

window.updateOverlayText = function(){

document.getElementById(
"liveOverlayText"
).innerText =

document.getElementById(
"overlayText"
).value;

};

// ================= UPLOAD =================

window.uploadPost = async function(){

const file =
document.getElementById("file").files[0];

if(!file){

alert("Select image/video");

return;

}

const caption =
document.getElementById("caption").value;

const overlayText =
document.getElementById("overlayText").value;

try{

document.getElementById("uploadMsg")
.innerText = "Uploading...";

const formData = new FormData();

formData.append("file",file);

formData.append(
"upload_preset",
"flashgram"
);

const response = await fetch(

"https://api.cloudinary.com/v1_1/dsqwcovob/auto/upload",

{
method:"POST",
body:formData
}

);

const data =
await response.json();

const mediaURL =
data.secure_url;

await addDoc(
collection(db,"posts"),
{

caption,

overlayText,

media: mediaURL,

type:
file.type.startsWith("video")
? "video"
: "image",

user:
auth.currentUser.email,

likes:0,

likedUsers:[],

comments:[],

createdAt:
serverTimestamp()

}
);

closeModal();

}catch(error){

document.getElementById("uploadMsg")
.innerText =
error.message;

}

};

// ================= LOAD POSTS =================

function loadPosts(){

const q = query(
collection(db,"posts"),
orderBy("createdAt","desc")
);

onSnapshot(q,(snapshot)=>{

const postsDiv =
document.getElementById("posts");

postsDiv.innerHTML = "";

snapshot.forEach((docSnap)=>{

const post = docSnap.data();

const postId = docSnap.id;

const comments =
post.comments || [];

const div =
document.createElement("div");

div.className = "post";

div.innerHTML = `

<div class="post-top">

${post.user}

</div>

<div class="media-wrap">

${
post.type === "image"

? `<img src="${post.media}"
class="feed-media">`

: `<video controls
src="${post.media}"
class="feed-media"></video>`
}

<div class="feed-text">
${post.overlayText || ""}
</div>

</div>

<p class="feed-caption">
${post.caption || ""}
</p>

<div
class="action-row"
data-liked-users='${JSON.stringify(post.likedUsers || [])}'>

<button
class="like-btn"
onclick="likePost('${postId}')">

❤️ ${post.likes || 0}

</button>

<div class="comment-count">

💬 ${comments.length}

</div>

</div>

<div class="comment-box">

<input
type="text"
id="comment-${postId}"
class="comment-input"
placeholder="Write comment...">

<button
class="comment-btn"
onclick="addComment('${postId}')">

Post

</button>

</div>

<div class="comment-list">

${
comments.map(comment => `

<div class="single-comment">

<div class="comment-user">
${comment.user}
</div>

<div>
${comment.text}
</div>

</div>

`).join("")
}

</div>

`;

postsDiv.appendChild(div);

});

});

}

// ================= LIKE =================

window.likePost = async function(postId){

const postRef =
doc(db,"posts",postId);

const userEmail =
auth.currentUser.email;

const button =
document.querySelector(
`button[onclick="likePost('${postId}')"]`
);

const parent =
button.closest(".action-row");

const likedUsers =
JSON.parse(
parent.dataset.likedUsers || "[]"
);

if(likedUsers.includes(userEmail)){

alert("Already liked");

return;

}

likedUsers.push(userEmail);

parent.dataset.likedUsers =
JSON.stringify(likedUsers);

await updateDoc(postRef,{

likes: increment(1),

likedUsers: arrayUnion(userEmail)

});

};

// ================= COMMENT =================

window.addComment = async function(postId){

const input =
document.getElementById(
`comment-${postId}`
);

const text =
input.value.trim();

if(!text) return;

const postRef =
doc(db,"posts",postId);

await updateDoc(postRef,{

comments: arrayUnion({

user:
auth.currentUser.email,

text:text

})

});

input.value = "";

};

</script>

</body>
</html>
