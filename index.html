<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Flashgram</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
}

header{
background:#1e293b;
padding:15px 20px;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
}

.logo{
font-size:24px;
font-weight:bold;
color:#ff4d6d;
}

.container{
max-width:600px;
margin:auto;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

input,
textarea{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#334155;
color:white;
font-size:15px;
}

textarea{
min-height:100px;
resize:vertical;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#ff4d6d;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.logout{
width:auto;
padding:10px 16px;
}

.hidden{
display:none;
}

.post{
background:#1e293b;
padding:15px;
border-radius:12px;
margin-bottom:20px;
}

.post img,
.post video{
width:100%;
margin-top:10px;
border-radius:10px;
}

.username{
font-weight:bold;
margin-bottom:10px;
}

.like-btn{
background:#334155;
margin-top:10px;
}

#uploadMsg,
#authMsg{
margin-top:10px;
font-size:14px;
color:#cbd5e1;
}

</style>

</head>

<body>

<header>

<div class="logo">⚡ Flashgram</div>

<button class="logout hidden" id="logoutBtn" onclick="logout()">
Logout
</button>

</header>

<div class="container">

<!-- LOGIN -->

<div class="card" id="authBox">

<h2>Login / Signup</h2>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button onclick="signup()">Signup</button>

<button onclick="login()">Login</button>

<button onclick="googleLogin()">Google Login</button>

<p id="authMsg"></p>

</div>

<!-- APP -->

<div id="app" class="hidden">

<div class="card">

<h2>Create Post</h2>

<input type="file" id="file">

<textarea id="caption" placeholder="Write caption"></textarea>

<button onclick="uploadPost()">Upload</button>

<p id="uploadMsg"></p>

</div>

<div id="posts"></div>

</div>

</div>

<script type="module">

// ================= IMPORTS =================

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
GoogleAuthProvider,
signInWithPopup,
onAuthStateChanged,
signOut
}
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
query,
orderBy,
onSnapshot,
serverTimestamp,
doc,
updateDoc,
increment
}
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


// ================= FIREBASE CONFIG =================

const firebaseConfig = {

apiKey: "AIzaSyDxyRpIkd1F8XLmfQ7tKwZMZdh1cHHmZYc",

authDomain: "flashgram-c87f7.firebaseapp.com",

projectId: "flashgram-c87f7",

storageBucket: "flashgram-c87f7.appspot.com",

messagingSenderId: "950828844867",

appId: "1:950828844867:web:9e970d4afec42c3e3911f6"

};


// ================= INITIALIZE =================

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);


// ================= SIGNUP =================

window.signup = async function(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

try{

await createUserWithEmailAndPassword(
auth,
email,
password
);

document.getElementById("authMsg").innerText =
"Signup successful";

}catch(err){

document.getElementById("authMsg").innerText =
err.message;

}

};


// ================= LOGIN =================

window.login = async function(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

try{

await signInWithEmailAndPassword(
auth,
email,
password
);

document.getElementById("authMsg").innerText =
"Login successful";

}catch(err){

document.getElementById("authMsg").innerText =
err.message;

}

};


// ================= GOOGLE LOGIN =================

window.googleLogin = async function(){

try{

const provider =
new GoogleAuthProvider();

await signInWithPopup(auth,provider);

}catch(err){

document.getElementById("authMsg").innerText =
err.message;

}

};


// ================= LOGOUT =================

window.logout = async function(){

await signOut(auth);

};


// ================= AUTH =================

onAuthStateChanged(auth,(user)=>{

if(user){

document.getElementById("authBox")
.classList.add("hidden");

document.getElementById("app")
.classList.remove("hidden");

document.getElementById("logoutBtn")
.classList.remove("hidden");

loadPosts();

}else{

document.getElementById("authBox")
.classList.remove("hidden");

document.getElementById("app")
.classList.add("hidden");

document.getElementById("logoutBtn")
.classList.add("hidden");

}

});


// ================= UPLOAD POST =================

window.uploadPost = async function(){

const file =
document.getElementById("file").files[0];

const caption =
document.getElementById("caption").value;

if(!file){

alert("Please select file");

return;

}

try{

document.getElementById("uploadMsg").innerText =
"Uploading...";

const formData = new FormData();

formData.append("file", file);

formData.append(
"upload_preset",
"flashgram"
);

const cloudinaryResponse = await fetch(

"https://api.cloudinary.com/v1_1/dsqwcovob/auto/upload",

{
method:"POST",
body:formData
}

);

const cloudinaryData =
await cloudinaryResponse.json();

if(cloudinaryData.error){

document.getElementById("uploadMsg").innerText =
cloudinaryData.error.message;

return;

}

const mediaURL =
cloudinaryData.secure_url;

await addDoc(collection(db,"posts"),{

caption: caption,

media: mediaURL,

type: file.type.startsWith("video")
? "video"
: "image",

user: auth.currentUser.email,

likes: 0,

createdAt: serverTimestamp()

});

document.getElementById("uploadMsg").innerText =
"Post uploaded successfully";

document.getElementById("caption").value = "";

document.getElementById("file").value = "";

}catch(error){

console.log(error);

document.getElementById("uploadMsg").innerText =
error.message;

}

};


// ================= LOAD POSTS =================

function loadPosts(){

const q = query(
collection(db,"posts"),
orderBy("createdAt","desc")
);

onSnapshot(q,(snapshot)=>{

const postsDiv =
document.getElementById("posts");

postsDiv.innerHTML = "";

snapshot.forEach((docSnap)=>{

const post = docSnap.data();

const postId = docSnap.id;

const div = document.createElement("div");

div.className = "post";

div.innerHTML = `

<div class="username">
${post.user}
</div>

<p>
${post.caption || ""}
</p>

${
post.type === "image"

? `<img src="${post.media}">`

: `<video controls src="${post.media}"></video>`
}

<button class="like-btn"
onclick="likePost('${postId}')">

❤️ ${post.likes || 0}

</button>

`;

postsDiv.appendChild(div);

});

});

}


// ================= LIKE =================

window.likePost = async function(postId){

const postRef =
doc(db,"posts",postId);

await updateDoc(postRef,{
likes: increment(1)
});

};

</script>

</body>
</html>
