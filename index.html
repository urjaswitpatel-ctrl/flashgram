<!-- ================= NEW AGE SOCIAL POST DESIGN ================= -->

<div class="neo-post-box">

<!-- TOP USER -->

<div class="neo-top">

<div class="neo-profile-ring">

<div class="neo-avatar">
U
</div>

</div>

<div>

<div class="neo-name">
Your Space
</div>

<div class="neo-status">
online now
</div>

</div>

</div>

<!-- PREVIEW -->

<div
class="neo-preview hidden"
id="previewContainer">

<img
id="previewImage"
class="neo-media hidden"
>

<video
id="previewVideo"
class="neo-media hidden"
controls>
</video>

<!-- GLASS OVERLAY -->

<div class="neo-glass">

<input
type="text"
id="overlayText"
placeholder="Type aesthetic text..."
oninput="updateOverlayText()"
>

<div
class="neo-live-text"
id="liveOverlayText">
</div>

</div>

</div>

<!-- TOOLBAR -->

<div class="neo-toolbar">

<!-- PLUS -->

<label class="neo-plus">

<input
type="file"
id="file"
hidden
accept="image/*,video/*"
onchange="previewMedia(event)"
>

+

</label>

<!-- SONG -->

<div class="neo-music">

🎵

<input
type="text"
id="songName"
placeholder="Add vibe soundtrack"
>

</div>

</div>

<!-- CAPTION -->

<textarea
id="caption"
class="neo-caption"
placeholder="Share your vibe...">
</textarea>

<!-- BUTTON -->

<button
class="neo-share"
onclick="uploadPost()">

Share Memory ✨

</button>

<p id="uploadMsg"></p>

</div>

<style>

/* ================= BODY FEEL ================= */

body{

background:
radial-gradient(circle at top left,
#1e1b4b,
#020617 60%);

}

/* ================= MAIN CARD ================= */

.neo-post-box{

max-width:550px;

margin:auto;

padding:20px;

border-radius:30px;

background:rgba(255,255,255,0.05);

backdrop-filter:blur(25px);

border:1px solid rgba(255,255,255,0.08);

box-shadow:
0 10px 40px rgba(0,0,0,0.5);

animation:floatIn 0.6s ease;

overflow:hidden;

position:relative;

}

/* ================= GLOW ================= */

.neo-post-box::before{

content:"";

position:absolute;

width:250px;

height:250px;

background:#ff00aa;

filter:blur(120px);

opacity:0.2;

top:-100px;

right:-100px;

border-radius:50%;

}

/* ================= TOP ================= */

.neo-top{

display:flex;

align-items:center;

gap:15px;

margin-bottom:18px;

position:relative;

z-index:2;

}

/* ================= PROFILE ================= */

.neo-profile-ring{

padding:3px;

border-radius:50%;

background:
linear-gradient(
45deg,
#ff00aa,
#7c3aed,
#00e5ff
);

}

.neo-avatar{

width:55px;

height:55px;

border-radius:50%;

background:#0f172a;

display:flex;

align-items:center;

justify-content:center;

font-size:22px;

font-weight:bold;

}

.neo-name{

font-size:17px;

font-weight:700;

}

.neo-status{

font-size:12px;

color:#00ff99;

}

/* ================= PREVIEW ================= */

.neo-preview{

position:relative;

overflow:hidden;

border-radius:24px;

margin-bottom:18px;

animation:zoomIn 0.4s ease;

}

.neo-media{

width:100%;

max-height:600px;

object-fit:cover;

display:block;

}

/* ================= GLASS ================= */

.neo-glass{

position:absolute;

bottom:20px;

left:20px;

right:20px;

padding:16px;

border-radius:20px;

background:rgba(255,255,255,0.08);

backdrop-filter:blur(15px);

border:1px solid rgba(255,255,255,0.1);

}

.neo-glass input{

width:100%;

padding:12px;

border:none;

border-radius:14px;

background:rgba(0,0,0,0.3);

color:white;

font-size:15px;

outline:none;

}

/* ================= LIVE TEXT ================= */

.neo-live-text{

margin-top:12px;

font-size:34px;

font-weight:800;

line-height:1.1;

background:
linear-gradient(
45deg,
#fff,
#ff00aa,
#00e5ff
);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

text-shadow:0 0 25px rgba(255,255,255,0.2);

word-break:break-word;

}

/* ================= TOOLBAR ================= */

.neo-toolbar{

display:flex;

align-items:center;

gap:15px;

margin-bottom:18px;

}

/* ================= PLUS ================= */

.neo-plus{

width:65px;

height:65px;

border-radius:24px;

display:flex;

justify-content:center;

align-items:center;

font-size:40px;

font-weight:bold;

cursor:pointer;

background:
linear-gradient(
135deg,
#ff00aa,
#7c3aed
);

transition:0.4s;

box-shadow:
0 10px 25px rgba(124,58,237,0.5);

}

.neo-plus:hover{

transform:
rotate(180deg)
scale(1.1);

}

/* ================= MUSIC ================= */

.neo-music{

flex:1;

display:flex;

align-items:center;

gap:10px;

padding:0 15px;

height:65px;

border-radius:20px;

background:rgba(255,255,255,0.05);

border:1px solid rgba(255,255,255,0.08);

backdrop-filter:blur(10px);

}

.neo-music input{

background:none;

border:none;

outline:none;

color:white;

width:100%;

font-size:15px;

}

/* ================= CAPTION ================= */

.neo-caption{

width:100%;

min-height:120px;

padding:18px;

border-radius:22px;

background:rgba(255,255,255,0.05);

border:1px solid rgba(255,255,255,0.08);

color:white;

font-size:15px;

resize:none;

outline:none;

margin-bottom:18px;

backdrop-filter:blur(10px);

}

/* ================= BUTTON ================= */

.neo-share{

width:100%;

padding:16px;

border:none;

border-radius:22px;

font-size:17px;

font-weight:700;

cursor:pointer;

background:
linear-gradient(
45deg,
#ff00aa,
#7c3aed,
#00e5ff
);

background-size:300% 300%;

animation:gradientMove 6s ease infinite;

color:white;

transition:0.4s;

box-shadow:
0 15px 35px rgba(124,58,237,0.4);

}

.neo-share:hover{

transform:translateY(-3px);

}

/* ================= ANIMATIONS ================= */

@keyframes gradientMove{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

@keyframes floatIn{

from{
opacity:0;
transform:
translateY(40px)
scale(0.95);
}

to{
opacity:1;
transform:
translateY(0)
scale(1);
}

}

@keyframes zoomIn{

from{
opacity:0;
transform:scale(0.9);
}

to{
opacity:1;
transform:scale(1);
}

}

.hidden{
display:none;
}

</style>

<script>

// ================= PREVIEW =================

window.previewMedia = function(event){

const file = event.target.files[0];

if(!file) return;

const image =
document.getElementById("previewImage");

const video =
document.getElementById("previewVideo");

const container =
document.getElementById("previewContainer");

container.classList.remove("hidden");

const fileURL =
URL.createObjectURL(file);

if(file.type.startsWith("image")){

image.src = fileURL;

image.classList.remove("hidden");

video.classList.add("hidden");

}else{

video.src = fileURL;

video.classList.remove("hidden");

image.classList.add("hidden");

}

};


// ================= TEXT =================

window.updateOverlayText = function(){

const text =
document.getElementById("overlayText").value;

document.getElementById(
"liveOverlayText"
).innerText = text;

};

</script>
